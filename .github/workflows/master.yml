name: build and test

on:
  - push
  - pull_request

env:
  BAZELISK_VERSION: v1.1.0
  BAZELISK_PATH: "/home/runner/bazel"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1

      - name: Mount bazel cache
        uses: actions/cache@v1
        with:
          path: "/home/runner/.cache/bazel"
          key: bazel

      - name: Get Bazelisk
        id: get-bazelisk
        uses: actions/cache@v1
        with:
          path: "${{ env.BAZELISK_PATH }}"
          key: bazelisk-${{ env.BAZELISK_VERSION }}
      - name: Install bazelisk
        if: steps.get-bazelisk.outputs.cache-hit != 'true'
        run: |
          curl -LO "https://github.com/bazelbuild/bazelisk/releases/download/${{ env.BAZELISK_VERSION }}/bazelisk-linux-amd64"
          mv bazelisk-linux-amd64 "${{ env.BAZELISK_PATH }}"
          chmod +x "${{ env.BAZELISK_PATH }}"

      - name: Test
        run: |
          "${{ env.BAZELISK_PATH }}" --test_output all test //...

      - name: Build
        run: |
          "${{ env.BAZELISK_PATH }}" build //...
